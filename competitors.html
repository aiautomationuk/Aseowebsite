<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Competitors — Auto-Seo.co.uk</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }</style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-900">

  <div class="fixed top-0 left-0 right-0 h-1 bg-slate-100 z-50">
    <div class="h-1 bg-indigo-500" style="width:83%"></div>
  </div>

  <div class="min-h-screen px-4 py-16 sm:px-6">
    <div class="mx-auto max-w-2xl space-y-6">

      <div class="text-center">
        <a href="index.html" class="inline-flex items-center gap-2 mb-6">
          <div class="w-8 h-8 bg-indigo-500 rounded-lg flex items-center justify-center text-white font-bold text-sm">A</div>
          <span class="font-extrabold text-slate-900">Auto-Seo<span class="text-indigo-500">.co.uk</span></span>
        </a>
        <p class="text-xs font-semibold uppercase tracking-wide text-slate-400 mb-2">Step 5 of 5</p>
        <h1 class="text-4xl font-bold text-slate-900">Your competitors</h1>
        <p class="mt-2 text-base text-slate-500">Here are some of your main competitors. Add or remove as needed.</p>
      </div>

      <div class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm space-y-5">

        <!-- Add form -->
        <div class="flex gap-2">
          <input id="new-domain" type="text" placeholder="competitor.co.uk"
            class="flex-1 rounded-lg border border-slate-200 px-4 py-2.5 text-sm text-slate-900 focus:outline-none focus:border-indigo-400 focus:ring-2 focus:ring-indigo-100" />
          <button onclick="addCompetitor()"
            class="px-4 py-2.5 rounded-lg border border-slate-200 bg-slate-50 text-sm font-semibold text-slate-700 hover:bg-slate-100 transition">
            Add
          </button>
        </div>

        <!-- List -->
        <div id="competitor-list" class="space-y-3"></div>

        <div class="flex items-center justify-between pt-4 border-t border-slate-100">
          <a href="process.html" class="text-sm font-medium text-slate-500 hover:text-slate-700 transition">← Back</a>
          <button onclick="goNext()"
            class="inline-flex items-center gap-2 bg-indigo-600 text-white font-bold px-6 py-3 rounded-full hover:bg-indigo-500 transition active:scale-95 text-sm">
            Continue →
          </button>
        </div>
      </div>

    </div>
  </div>

  <script>
    let competitors = [];

    function normUrl(v) {
      v = v.trim();
      if (!v) return '';
      return /^https?:\/\//i.test(v) ? v : 'https://' + v;
    }

    function getDomain(v) {
      try { return new URL(normUrl(v)).hostname; } catch { return v.trim(); }
    }

    function load() {
      const raw = sessionStorage.getItem('scan_competitors');
      if (raw) {
        try {
          const parsed = JSON.parse(raw);
          competitors = parsed.map(item => {
            const url = normUrl(item.url || item.name || '');
            const domain = getDomain(url || item.name || '');
            return {
              name:   item.name || domain,
              domain,
              url:    url || normUrl(domain),
              reason: item.reason || 'Direct competitor',
            };
          }).filter(c => c.domain);
        } catch { competitors = []; }
      }

      render();
    }

    function save() {
      sessionStorage.setItem('scan_competitors', JSON.stringify(
        competitors.map(c => ({ name: c.domain, url: c.url }))
      ));
    }

    function render() {
      const list = document.getElementById('competitor-list');
      if (!competitors.length) {
        list.innerHTML = '<p class="text-sm text-slate-400 border border-dashed border-slate-200 rounded-lg p-4">No competitors yet. Add at least one above.</p>';
        return;
      }
      list.innerHTML = competitors.map((c, i) => `
        <div class="flex items-center justify-between rounded-xl border border-slate-200 bg-white px-4 py-3 gap-3">
          <div class="flex items-center gap-3 min-w-0">
            <img src="https://www.google.com/s2/favicons?domain=${encodeURIComponent(c.domain)}&sz=64"
              onerror="this.src='https://icon.horse/icon/${encodeURIComponent(c.domain)}'"
              class="h-9 w-9 rounded flex-shrink-0" alt="" />
            <div class="min-w-0">
              <a href="${escHtml(c.url)}" target="_blank" rel="noopener noreferrer"
                class="text-sm font-semibold text-slate-900 underline truncate block hover:text-indigo-600">
                ${escHtml(c.name || c.url)}
              </a>
              <div class="text-xs text-slate-500">${escHtml(c.reason || 'Direct competitor')}</div>
            </div>
          </div>
          <button onclick="removeCompetitor(${i})" class="text-xs font-semibold text-rose-500 hover:text-rose-700 flex-shrink-0">Remove</button>
        </div>
      `).join('');
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function addCompetitor() {
      const input = document.getElementById('new-domain');
      const val = input.value.trim();
      if (!val) return;
      const domain = getDomain(val);
      if (competitors.find(c => c.domain === domain)) { input.value = ''; return; }
      competitors.push({ domain, url: normUrl(val) });
      save();
      input.value = '';
      render();
    }

    document.getElementById('new-domain').addEventListener('keydown', e => {
      if (e.key === 'Enter') addCompetitor();
    });

    function removeCompetitor(i) {
      competitors.splice(i, 1);
      save();
      render();
    }

    function goNext() {
      save();
      window.location.href = 'final.html';
    }

    load();
  </script>
</body>
</html>
