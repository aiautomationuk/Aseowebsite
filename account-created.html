<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Creating Your Account — Auto-Seo.co.uk</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 60%, #9333ea 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 48px 40px;
      max-width: 480px;
      width: 100%;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0,0,0,0.25);
    }

    /* Circular spinner */
    .spinner-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 28px;
    }
    .spinner {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 6px solid #e0e7ff;
      border-top-color: #6366f1;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 12px;
    }
    .subtitle {
      font-size: 0.95rem;
      color: #64748b;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    /* Status bar */
    .status-bar {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .status-spinner {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid #c7d2fe;
      border-top-color: #6366f1;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    .status-text {
      font-size: 0.875rem;
      font-weight: 600;
      color: #475569;
    }

    .footnote {
      font-size: 0.8rem;
      color: #94a3b8;
    }

  </style>
</head>
<body>
  <div class="card">

    <!-- Loading state -->
    <div id="loading-state">
      <div class="spinner-wrap">
        <div class="spinner"></div>
      </div>
      <h1>Creating Your Account</h1>
      <p class="subtitle">We're setting up your account. This will only take a moment…</p>
      <div class="status-bar">
        <div class="status-spinner"></div>
        <span class="status-text" id="status-text">Creating your account…</span>
      </div>
      <p class="footnote">Please wait, this will complete automatically…</p>
    </div>


  </div>

  <script>
    const steps = [
      'Creating your account…',
      'Saving your business details…',
      'Building your SEO profile…',
      'Almost there…',
    ];

    let stepIdx = 0;
    const statusEl = document.getElementById('status-text');

    const stepTimer = setInterval(() => {
      stepIdx++;
      if (stepIdx < steps.length) {
        statusEl.textContent = steps[stepIdx];
      }
    }, 800);

    async function createAccount() {
      const payload = {
        firstName:   sessionStorage.getItem('user_first_name') || '',
        lastName:    sessionStorage.getItem('user_last_name')  || '',
        email:       sessionStorage.getItem('user_email')      || '',
        phone:       sessionStorage.getItem('user_phone')      || '',
        websiteUrl:  sessionStorage.getItem('scan_url')        || '',
        summary:     sessionStorage.getItem('scan_summary')    || '',
        brandName:   sessionStorage.getItem('scan_brand')      || '',
        location:    sessionStorage.getItem('scan_location')   || '',
        serviceArea: sessionStorage.getItem('scan_service_area') || '',
        keyphrase:   sessionStorage.getItem('scan_keyphrase')  || '',
        offers:      JSON.parse(sessionStorage.getItem('scan_offers')      || '[]'),
        competitors: JSON.parse(sessionStorage.getItem('scan_competitors') || '[]'),
      };

      try {
        await fetch('signup.php', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify(payload),
        });
      } catch (_) {
        // Fail silently — don't block the user journey
      }

      clearInterval(stepTimer);

      // Redirect straight to trial page — celebration happens there
      window.location.href = 'trial.html';
    }

    // Small delay before firing so the animation feels natural
    setTimeout(createAccount, 1200);
  </script>
</body>
</html>
